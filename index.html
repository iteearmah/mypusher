<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pusher Web Client</title>
  <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #messages { border: 1px solid #ccc; padding: 10px; height: 200px; overflow-y: scroll; margin-bottom: 10px; }
    input { padding: 10px; width: 200px; }
    button { padding: 10px; }
  </style>
</head>
<body>
  <h1>Pusher Web Client</h1>
  <div id="messages"></div>
  <input type="text" id="messageInput" placeholder="Type a message...">
  <button onclick="sendMessage()">Send</button>

  <script>
    // The .htaccess on the server proxies WebSocket (ws/wss) upgrade requests
    // arriving on the standard ports (80/443) of the domain to the internal
    // Node.js server on port 3000. So the client must connect to the domain on
    // the standard HTTPS port (443) WITHOUT specifying port 3000, and use TLS.
    const PUSHER_KEY = 'any-key'; // Our custom server doesn't validate keys yet
    const PUSHER_CLUSTER = 'mt1';
    const SERVER_HOST = 'your-dummy-host.com';
    const SERVER_URL = `https://${SERVER_HOST}`;

    const pusher = new Pusher(PUSHER_KEY, {
      cluster: PUSHER_CLUSTER,
      wsHost: SERVER_HOST,
      wsPort: 80,
      wssPort: 443,
      forceTLS: false,
      disableStats: true,
      enabledTransports: ['ws', 'wss']
    });

    const channel = pusher.subscribe('my-channel');
    channel.bind('my-event', (data) => {
      const messagesDiv = document.getElementById('messages');
      const messageElement = document.createElement('div');
      messageElement.textContent = `Received: ${JSON.stringify(data)}`;
      messagesDiv.appendChild(messageElement);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value;
      if (!message) return;

      try {
        const response = await fetch(`${SERVER_URL}/message`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            channel: 'my-channel',
            event: 'my-event',
            data: { message: message }
          }),
        });
        if (response.ok) {
          input.value = '';
        } else {
          console.error('Failed to send message');
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }
  </script>
</body>
</html>
