<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusher Server Monitor</title>
    <style>
        :root {
            /* Retro Professional Palette - "Amber Terminal" variant */
            --primary: #ffb000;
            --primary-muted: #cc8d00;
            --bg-body: #121212;
            --bg-card: #1a1a1a;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --border: #333333;
            --border-bright: #444444;
            --radius: 2px; /* Sharper corners for retro feel */
            --font-mono: "ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", monospace;
        }

        * { box-sizing: border-box; }
        
        body { 
            font-family: var(--font-mono); 
            margin: 0; 
            padding: 32px; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
            background-image: linear-gradient(rgba(18, 18, 18, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
        }

        h1 { 
            color: var(--primary); 
            font-size: 1.5rem; 
            font-weight: 700; 
            margin-top: 0; 
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            padding-bottom: 4px;
        }

        h2 { 
            font-size: 1rem; 
            font-weight: 700; 
            margin-bottom: 1rem;
            color: var(--primary);
            text-transform: uppercase;
        }

        .stats-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            margin-bottom: 32px; 
        }

        .stat-card { 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: var(--radius); 
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--border-bright);
        }

        .stat-value { 
            font-size: 2rem; 
            font-weight: 700; 
            color: var(--primary); 
            line-height: 1;
            text-shadow: 0 0 10px rgba(255, 176, 0, 0.2);
        }

        .stat-label { 
            color: var(--text-dim); 
            font-size: 0.75rem; 
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .table-container { 
            width: 100%; 
            background: var(--bg-card); 
            border-radius: var(--radius); 
            border: 1px solid var(--border);
            margin-bottom: 32px;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left;
        }

        th { 
            background-color: #222222; 
            font-weight: 700; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            color: var(--primary);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-bright);
        }

        td { 
            padding: 12px 16px; 
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border); 
            color: var(--text-main);
        }

        tr:last-child td { border-bottom: none; }
        
        tr:hover td { background-color: #222222; color: var(--primary); }

        .refresh-info { 
            margin-top: 32px; 
            font-size: 0.7rem; 
            color: var(--text-dim); 
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .refresh-info::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 0; /* Square for retro */
            box-shadow: 0 0 5px var(--primary);
        }

        .event-log { 
            max-height: 350px; 
            overflow-y: auto; 
            background: #0a0a0a; 
            padding: 0; 
            border-radius: var(--radius); 
            border: 1px solid var(--border);
            scrollbar-width: thin;
            scrollbar-color: var(--border-bright) #0a0a0a;
        }

        .event-item { 
            padding: 6px 16px; 
            border-bottom: 1px solid #1a1a1a; 
            font-size: 0.75rem;
            display: flex;
            gap: 12px;
        }

        .event-item:last-child { border-bottom: none; }

        .event-time { color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }
        
        .event-type { 
            font-weight: 700; 
            color: var(--primary-muted); 
            min-width: 90px;
            flex-shrink: 0;
            text-transform: uppercase;
        }
        
        .event-details { color: var(--text-main); word-break: break-all; }

        .event-type.type-connect { color: #00ff00; }
        .event-type.type-disconnect { color: #ff0000; }
        .event-type.type-subscribe { color: #0088ff; }
        .event-type.type-broadcast { color: var(--primary); }

        .search-container {
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
        }

        .retro-input {
            background: #0a0a0a;
            border: 1px solid var(--border);
            color: var(--primary);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            padding: 4px 8px;
            outline: none;
            width: 100%;
        }

        .retro-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(255, 176, 0, 0.3);
        }

        .retro-btn {
            background: #222222;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 0.65rem;
            padding: 4px 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .retro-btn:hover {
            background: #333333;
            color: var(--primary);
            border-color: var(--primary);
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #00ff00;
            margin-left: 15px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background-color: #00ff00;
            box-shadow: 0 0 5px #00ff00;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        @media (max-width: 768px) {
            body { padding: 20px; }
            .stats-container { grid-template-columns: 1fr 1fr; gap: 12px; }
            .stat-card { padding: 16px; }
            .stat-value { font-size: 1.5rem; }
        }

        @media (max-width: 480px) {
            .stats-container { grid-template-columns: 1fr; }
            .stat-card { width: 100%; }
        }
    </style>
</head>
<body>
    <h1>Pusher Server Monitor <span class="live-indicator"><span class="live-dot"></span> LIVE</span></h1>
    
    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-label">Connected Users</div>
            <div id="total-clients" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Active Channels</div>
            <div id="active-channels" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Countries</div>
            <div id="total-countries" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Memory Usage</div>
            <div id="memory-usage" class="stat-value">0MB</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Msgs In/Out</div>
            <div id="messages-count" class="stat-value">0 / 0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Server Uptime</div>
            <div id="uptime" class="stat-value">0s</div>
        </div>
    </div>

    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <div style="flex: 2; min-width: 300px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px;">
                <h2 style="margin: 0;">Active Channels</h2>
                <div style="width: 200px; display: flex; gap: 10px;">
                    <input type="text" id="channel-search" class="retro-input" placeholder="SEARCH CHANNELS...">
                </div>
            </div>
            <div class="table-container">
                <table id="channels-table">
                    <thead>
                        <tr>
                            <th>Channel Name</th>
                            <th>Subscribers</th>
                            <th>Countries</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Channels will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
        <div style="flex: 1; min-width: 250px;">
            <h2>Connections by Country</h2>
            <div class="table-container">
                <table id="countries-table">
                    <thead>
                        <tr>
                            <th>Country</th>
                            <th>Connections</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Countries will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px;">
            <h2 style="margin: 0;">Recent Server Events</h2>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <input type="text" id="event-search" class="retro-input" placeholder="FILTER EVENTS..." style="width: 180px;">
                <button id="clear-events" class="retro-btn">CLEAR LOG</button>
            </div>
        </div>
        <div id="event-log" class="event-log">
            <!-- Events will be populated here -->
        </div>
    </div>

    <div class="refresh-info">
        Last updated: <span id="last-updated">-</span>. Refreshing every 5 seconds.
    </div>

    <script>
        let channelFilter = '';
        let eventFilter = '';
        let isLogCleared = false;
        let clearTimestamp = null;
        let lastData = { channels: {}, countries: {}, recentEvents: [] };
        const clientCountries = new Map();

        document.getElementById('channel-search').addEventListener('input', (e) => {
            channelFilter = e.target.value.toLowerCase();
            renderChannels(lastData);
        });

        document.getElementById('event-search').addEventListener('input', (e) => {
            eventFilter = e.target.value.toLowerCase();
            renderEvents(lastData);
        });

        document.getElementById('clear-events').addEventListener('click', () => {
            isLogCleared = true;
            clearTimestamp = new Date().toISOString();
            renderEvents(lastData);
        });

        async function fetchStats() {
            try {
                const response = await fetch('/monitor/stats');
                const data = await response.json();
                
                // Update client mapping from events
                if (data.recentEvents) {
                    data.recentEvents.forEach(e => {
                        if (e.type === 'client_info' && e.details && e.details.socketId) {
                            clientCountries.set(e.details.socketId, e.details.country);
                        }
                    });
                }

                // If log was cleared, check if we have any new events to reset the cleared state
                // Or simply keep it cleared for existing events in the server-side buffer
                if (isLogCleared && data.recentEvents && data.recentEvents.length > 0) {
                     const newestEvent = data.recentEvents[0];
                     if (newestEvent.time > clearTimestamp) {
                         // We have new events, but we still only show them in renderEvents based on clearTimestamp
                     }
                }

                lastData = data;
                
                document.getElementById('total-clients').textContent = data.totalClients;
                document.getElementById('active-channels').textContent = data.totalChannels;
                document.getElementById('total-countries').textContent = Object.keys(data.countries || {}).length;
                document.getElementById('memory-usage').textContent = formatMemory(data.memory.rss);
                document.getElementById('messages-count').textContent = `${data.messagesReceived || 0} / ${data.messagesSent || 0}`;
                document.getElementById('uptime').textContent = formatUptime(data.uptime);
                document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();

                renderChannels(data);
                renderCountries(data);
                renderEvents(data);
                
            } catch (err) {
                console.error('Failed to fetch stats:', err);
            }
        }

        function getFlagEmoji(countryCode) {
            if (!countryCode || countryCode === 'Unknown' || countryCode === '-') return '';
            const codePoints = countryCode
                .toUpperCase()
                .split('')
                .map(char => 127397 + char.charCodeAt(0));
            return String.fromCodePoint(...codePoints);
        }

        function renderChannels(data) {
            const tableBody = document.querySelector('#channels-table tbody');
            tableBody.innerHTML = '';
            
            const entries = Object.entries(data.channels);
            const filteredEntries = entries.filter(([name]) => name.toLowerCase().includes(channelFilter));

            for (const [name, info] of filteredEntries) {
                const row = document.createElement('tr');
                const countries = info.countries.map(c => `${getFlagEmoji(c)} ${c}`).join(', ') || '-';
                row.innerHTML = `<td>${name}</td><td>${info.count}</td><td>${countries}</td>`;
                tableBody.appendChild(row);
            }
            
            if (filteredEntries.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="3">${entries.length === 0 ? 'No active channels' : 'No matching channels'}</td></tr>`;
            }
        }

        function renderCountries(data) {
            const countryTableBody = document.querySelector('#countries-table tbody');
            countryTableBody.innerHTML = '';
            
            const sortedCountries = Object.entries(data.countries || {}).sort((a, b) => b[1] - a[1]);
            for (const [country, count] of sortedCountries) {
                const row = document.createElement('tr');
                const flag = getFlagEmoji(country);
                row.innerHTML = `<td>${flag} ${country}</td><td>${count}</td>`;
                countryTableBody.appendChild(row);
            }
            
            if (Object.keys(data.countries || {}).length === 0) {
                countryTableBody.innerHTML = '<tr><td colspan="2">No data</td></tr>';
            }
        }

        function renderEvents(data) {
            const eventLog = document.getElementById('event-log');
            let eventsToShow = (data.recentEvents || []).filter(e => e.type !== 'client_info');
            
            if (isLogCleared && clearTimestamp) {
                // Only show events that happened after the clear action
                eventsToShow = eventsToShow.filter(event => event.time > clearTimestamp);
            }

            const filteredEvents = eventsToShow.filter(event => {
                const text = `${event.type} ${event.details}`.toLowerCase();
                return text.includes(eventFilter);
            });

            eventLog.innerHTML = '';
            filteredEvents.forEach(event => {
                const item = document.createElement('div');
                item.className = 'event-item';
                const time = new Date(event.time).toLocaleTimeString();
                const typeClass = `type-${event.type.toLowerCase()}`;
                
                let details = event.details;
                // Add flag to connect/subscribe events if country/details is present
                if (event.type === 'connect' && details.includes('Country: ')) {
                    const countryPart = details.split('Country: ')[1];
                    if (countryPart) {
                        const country = countryPart.split(',')[0].trim();
                        const flag = getFlagEmoji(country);
                        if (flag) {
                            details = details.replace(`Country: ${country}`, `Country: ${flag} ${country}`);
                        }
                    }
                } else if (event.type === 'subscribe' && details.includes('Channel: ')) {
                    // Find if we can link this to a country from current data
                    const socketIdPart = details.split('ID: ')[1];
                    if (socketIdPart) {
                        const socketId = socketIdPart.split(',')[0].trim();
                        const country = clientCountries.get(socketId);
                        if (country) {
                            const flag = getFlagEmoji(country);
                            if (flag) {
                                details += ` (${flag})`;
                            }
                        }
                    }
                } else if (event.type === 'disconnect' && details.includes('ID: ')) {
                    const socketIdPart = details.split('ID: ')[1];
                    if (socketIdPart) {
                        const socketId = socketIdPart.split(',')[0].trim();
                        const country = clientCountries.get(socketId);
                        if (country) {
                            const flag = getFlagEmoji(country);
                            if (flag) {
                                details += ` (${flag})`;
                            }
                        }
                    }
                }

                item.innerHTML = `<span class="event-time">${time}</span> <span class="event-type ${typeClass}">${event.type.toUpperCase()}</span> <span class="event-details">${details}</span>`;
                eventLog.appendChild(item);
            });

            if (filteredEvents.length === 0) {
                eventLog.innerHTML = `<div style="padding: 10px 16px; font-size: 0.75rem; color: var(--text-dim);">${(data.recentEvents || []).length === 0 ? 'No recent events' : 'No matching events'}</div>`;
            }
        }

        function formatUptime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return `${h}h ${m}m ${s}s`;
        }

        function formatMemory(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        fetchStats();
        setInterval(fetchStats, 5000);
    </script>
</body>
</html>
